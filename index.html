<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FockNote — Own your fockin' notes.</title>
  <meta name="description" content="Free, installable, git-backed personal notebook. Fork your own Notion." />
  <meta name="theme-color" content="#0d1117" />
  <link rel="icon" href="https://github.com/focknote.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    :root {
      --theme-color: #2f81f7;
      --cover-background-color: #0d1117 !important;
    }
    .app-name-link img { width: 40px; }
    section.cover { background: #0d1117 !important; color: #e6edf3; }
    section.cover .cover-main > p:last-child a { border-radius: 999px; }
    .markdown-section code { color: #2f81f7; }
  </style>
</head>
<body>
  <div id="app">Loading FockNote…</div>
  <script>
    window.$docsify = {
      name: '🍴 FockNote',
      repo: 'focknote/focknote',
      loadSidebar: true,
      coverpage: true,
      onlyCover: false,
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      search: { placeholder: 'Search the docs…', noData: 'Nothing found.' },
      alias: {
        '/_sidebar.md': '/_sidebar.md',
      },
      plugins: [
        // Strip leading YAML frontmatter (SKILL.md keeps it for Claude; hide it on the site).
        function (hook) {
          hook.beforeEach(function (content) {
            return content.replace(/^﻿?---\r?\n[\s\S]*?\r?\n---\r?\n/, '');
          });
        },
      ],
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-powershell.min.js"></script>
</body>
</html>
